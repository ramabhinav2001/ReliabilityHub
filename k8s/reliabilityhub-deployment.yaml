apiVersion: apps/v1
kind: Deployment
metadata:
  name: reliabilityhub-app
  namespace: reliabilityhub
  labels:
    app: reliabilityhub-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reliabilityhub-app
  template:
    metadata:
      labels:
        app: reliabilityhub-app
    spec:
      containers:
        - name: reliabilityhub-app
          image: ramabhinav2001/reliabilityhub:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: reliabilityhub-config
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "750m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: reliabilityhub-app
  namespace: reliabilityhub
spec:
  selector:
    app: reliabilityhub-app
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reliabilityhub-app
  namespace: reliabilityhub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reliabilityhub-app
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
