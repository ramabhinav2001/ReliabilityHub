apiVersion: apps/v1
kind: Deployment
metadata:
  name: reliabilityhub-alert-router
  namespace: reliabilityhub
  labels:
    app: reliabilityhub-alert-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reliabilityhub-alert-router
  template:
    metadata:
      labels:
        app: reliabilityhub-alert-router
    spec:
      containers:
        - name: alert-router
          image: ramabhinav2001/reliabilityhub:latest
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "start:alerting"]
          ports:
            - containerPort: 3100
          envFrom:
            - configMapRef:
                name: alert-router-config
            - secretRef:
                name: alert-router-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: reliabilityhub-alert-router
  namespace: reliabilityhub
spec:
  selector:
    app: reliabilityhub-alert-router
  ports:
    - name: http
      port: 3100
      targetPort: 3100
