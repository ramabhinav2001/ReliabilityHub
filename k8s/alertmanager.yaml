apiVersion: v1
kind: ConfigMap
metadata:
  name: reliabilityhub-alertmanager-config
  namespace: reliabilityhub
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "service", "severity"]
      group_wait: 30s
      group_interval: 2m
      repeat_interval: 30m
      receiver: "slack-webhook"
      routes:
        - matchers:
            - severity="critical"
          receiver: "slack-webhook"
          continue: true
        - matchers:
            - severity="warning"
          receiver: "slack-webhook"
    receivers:
      - name: "slack-webhook"
        webhook_configs:
          - url: "http://reliabilityhub-alert-router:3100/alerts"
            send_resolved: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reliabilityhub-alertmanager
  namespace: reliabilityhub
  labels:
    app: reliabilityhub-alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reliabilityhub-alertmanager
  template:
    metadata:
      labels:
        app: reliabilityhub-alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: alertmanager-config
              mountPath: /etc/alertmanager
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: alertmanager-config
          configMap:
            name: reliabilityhub-alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: reliabilityhub-alertmanager
  namespace: reliabilityhub
spec:
  selector:
    app: reliabilityhub-alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
