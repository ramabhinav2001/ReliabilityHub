apiVersion: v1
kind: ConfigMap
metadata:
  name: reliabilityhub-prometheus-config
  namespace: reliabilityhub
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/alerts/reliabilityhub.rules.yml
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - reliabilityhub-alertmanager:9093
    scrape_configs:
      - job_name: reliabilityhub-app
        metrics_path: /metrics
        static_configs:
          - targets:
              - reliabilityhub-app:3000
  reliabilityhub.rules.yml: |
    groups:
      - name: reliabilityhub.core.alerts
        rules:
          - alert: ReliabilityHubLowAvailability
            expr: reliabilityhub_service_availability_percent < 99.5
            for: 2m
            labels:
              severity: critical
              service: reliabilityhub
            annotations:
              summary: ReliabilityHub availability dropped below SLO
              description: Availability is {{ $value }}% for the monitored service.
          - alert: ReliabilityHubHighErrorRate
            expr: reliabilityhub_service_error_rate_percent > 2
            for: 2m
            labels:
              severity: warning
              service: reliabilityhub
            annotations:
              summary: ReliabilityHub error rate breach
              description: Error rate is {{ $value }}% and exceeded threshold.
          - alert: ReliabilityHubHighLatency
            expr: reliabilityhub_service_latency_p95_ms > 450
            for: 2m
            labels:
              severity: warning
              service: reliabilityhub
            annotations:
              summary: ReliabilityHub p95 latency is high
              description: p95 latency is {{ $value }} ms.
          - alert: ReliabilityHubAnomalyDetected
            expr: reliabilityhub_service_anomaly_score > 4
            for: 1m
            labels:
              severity: critical
              service: reliabilityhub
            annotations:
              summary: Anomaly score indicates unhealthy behavior
              description: Anomaly score is {{ $value }}.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reliabilityhub-prometheus
  namespace: reliabilityhub
  labels:
    app: reliabilityhub-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reliabilityhub-prometheus
  template:
    metadata:
      labels:
        app: reliabilityhub-prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "750m"
              memory: "1Gi"
      volumes:
        - name: prometheus-config
          configMap:
            name: reliabilityhub-prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: reliabilityhub-prometheus
  namespace: reliabilityhub
spec:
  selector:
    app: reliabilityhub-prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
