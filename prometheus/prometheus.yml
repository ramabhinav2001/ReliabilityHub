global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/reliabilityhub.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "reliabilityhub-app"
    static_configs:
      - targets:
          - reliabilityhub:3000
    metrics_path: /metrics
