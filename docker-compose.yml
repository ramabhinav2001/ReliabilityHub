services:
  reliabilityhub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reliabilityhub-app
    environment:
      - PORT=3000
      - CHECK_INTERVAL_MS=10000
      - CHECK_TIMEOUT_MS=3000
      - AVAILABILITY_SLO=99.9
      - ERROR_RATE_THRESHOLD=1.5
      - LATENCY_THRESHOLD_MS=350
      - DEPENDENCY_TARGETS=https://httpstat.us/200,https://httpstat.us/503
    ports:
      - "3000:3000"
    networks:
      - reliabilityhub

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: reliabilityhub-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
    ports:
      - "9090:9090"
    depends_on:
      - reliabilityhub
    networks:
      - reliabilityhub

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: reliabilityhub-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    depends_on:
      - alert-router
    networks:
      - reliabilityhub

  alert-router:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reliabilityhub-alert-router
    command: npm run start:alerting
    environment:
      - ALERT_ROUTER_PORT=3100
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - CLOUDWATCH_NAMESPACE=${CLOUDWATCH_NAMESPACE:-ReliabilityHub/Alerts}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - SLACK_CHANNEL_CRITICAL=${SLACK_CHANNEL_CRITICAL:-#reliability-critical}
      - SLACK_CHANNEL_WARNING=${SLACK_CHANNEL_WARNING:-#reliability-warning}
    ports:
      - "3100:3100"
    networks:
      - reliabilityhub

  grafana:
    image: grafana/grafana:11.2.2
    container_name: reliabilityhub-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - reliabilityhub

networks:
  reliabilityhub:
    driver: bridge
